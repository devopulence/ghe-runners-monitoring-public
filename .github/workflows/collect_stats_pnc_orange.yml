name: Collect Monitoring Stats (pnc-orange)

on:
  schedule:
    # Runs every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max API pages per repo for workflow runs'
        required: false
        default: '10'
      max_runs:
        description: 'Max runs to fetch jobs for per repo'
        required: false
        default: '50'
      skip_jobs:
        description: 'Skip job collection (faster, runs only)'
        required: false
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GH_MONITORING_TOKEN }}
  DEFAULT_ORG: 'pnc-orange'

jobs:
  collect:
    runs-on: [self-hosted, k8s]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run scheduled collection
        run: |
          MAX_PAGES="${{ github.event.inputs.max_pages || '10' }}"
          MAX_RUNS="${{ github.event.inputs.max_runs || '50' }}"
          SKIP_JOBS="${{ github.event.inputs.skip_jobs || 'false' }}"

          ARGS="--org ${{ env.DEFAULT_ORG }} --max-pages ${MAX_PAGES}"

          if [ "${MAX_RUNS}" != "" ]; then
            ARGS="${ARGS} --max-runs ${MAX_RUNS}"
          fi

          if [ "${SKIP_JOBS}" = "true" ]; then
            ARGS="${ARGS} --skip-jobs"
          fi

          echo "Running: python -m src.monitoring.scheduled_collect ${ARGS} -v"
          python -m src.monitoring.scheduled_collect ${ARGS} --token "${{ secrets.GH_MONITORING_TOKEN }}" --source workflow -v

      - name: Commit monitoring data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitoring_data/
          if git diff --staged --quiet; then
            echo "No new monitoring data to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: collect pnc-orange monitoring stats for ${DATE}"
            git pull --rebase
            git push
          fi

      - name: Upload monitoring data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-data-pnc-orange-${{ github.run_id }}
          path: monitoring_data/
          retention-days: 30
